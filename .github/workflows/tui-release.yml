name: TUI Release

on:
  push:
    tags:
      - 'tui-v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: tui/go.mod
          cache-dependency-path: tui/go.sum

      - name: Build binary
        working-directory: tui
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          BINARY=skene-${{ matrix.goos }}-${{ matrix.goarch }}
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY="${BINARY}.exe"
          fi
          VERSION="${GITHUB_REF_NAME#tui-}"
          go build -ldflags "-s -w -X skene/internal/constants.Version=${VERSION}" -o "../build/${BINARY}" ./cmd/skene/

      - name: Package archive
        run: |
          cd build
          BINARY=skene-${{ matrix.goos }}-${{ matrix.goarch }}
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${BINARY}.zip" "${BINARY}.exe"
          else
            tar -czf "${BINARY}.tar.gz" "${BINARY}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: skene-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/skene-${{ matrix.goos }}-${{ matrix.goarch }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract version from tag
        id: version
        run: |
          echo "version=${GITHUB_REF_NAME#tui-}" >> "$GITHUB_OUTPUT"
          if [[ "$GITHUB_REF_NAME" =~ (rc|alpha|beta|a[0-9]|b[0-9]) ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "TUI ${{ steps.version.outputs.version }}"
          prerelease: ${{ steps.version.outputs.prerelease }}
          generate_release_notes: true
          files: artifacts/*
