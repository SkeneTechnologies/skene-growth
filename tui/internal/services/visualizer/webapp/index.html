<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skene — Engine Visualizer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
    }

    .react-flow__node { font-family: inherit; }

    /* Subject card */
    .node-subject {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 14px 18px;
      min-width: 180px;
    }
    .node-subject .node-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .node-subject .node-title {
      font-size: 15px;
      font-weight: 600;
      color: #e6edf3;
      text-transform: capitalize;
    }
    .node-subject .node-meta {
      font-size: 11px;
      color: #7d8590;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .badge-actor  { background: #1f3a2d; color: #56d364; }
    .badge-entity { background: #1c2a41; color: #79c0ff; }

    /* Feature card */
    .node-feature {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 16px 18px;
      min-width: 260px;
      max-width: 320px;
    }
    .node-feature .node-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }
    .node-feature .node-title {
      font-size: 14px;
      font-weight: 600;
      color: #e6edf3;
      line-height: 1.3;
    }
    .node-feature .node-desc {
      font-size: 12px;
      color: #8b949e;
      line-height: 1.5;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .node-feature .node-source {
      font-size: 11px;
      color: #7d8590;
      font-family: 'SF Mono', 'Fira Code', monospace;
      margin-bottom: 8px;
    }
    .node-feature .node-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .tag {
      display: inline-block;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 4px;
      background: #1c2a41;
      color: #79c0ff;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    .badge-lifecycle {
      background: #2d1f3a;
      color: #d2a8ff;
    }

    /* Action card */
    .node-action {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 14px 18px;
      min-width: 160px;
    }
    .node-action .node-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .node-action .node-title {
      font-size: 13px;
      font-weight: 600;
      color: #e6edf3;
      text-transform: capitalize;
    }
    .node-action .node-meta {
      font-size: 11px;
      color: #7d8590;
    }

    .badge-action { background: #3d2a1f; color: #f0883e; }

    /* Edge labels */
    .react-flow__edge-textbg { fill: #161b22; }
    .react-flow__edge-text { fill: #7d8590; font-size: 11px; }

    /* Handles */
    .react-flow__handle {
      width: 8px;
      height: 8px;
      background: #30363d;
      border: 2px solid #484f58;
    }
  </style>
</head>
<body>
  <div id="root" style="width:100vw;height:100vh"></div>

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react-dom": "https://esm.sh/react-dom@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
      "@xyflow/react": "https://esm.sh/@xyflow/react@12.10.2?external=react,react-dom"
    }
  }
  </script>

  <link rel="stylesheet" href="https://esm.sh/@xyflow/react@12.10.2/dist/style.css" />

  <script type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import {
      ReactFlow, Background, Controls, MiniMap, Handle, Position,
    } from '@xyflow/react';

    const h = React.createElement;

    function SubjectNode({ data }) {
      const kindClass = data.kind === 'actor' ? 'badge-actor' : 'badge-entity';
      return h('div', { className: 'node-subject' },
        h(Handle, { type: 'source', position: Position.Right }),
        h('div', { className: 'node-header' },
          h('span', { className: 'node-title' }, data.label),
          h('span', { className: `badge ${kindClass}` }, data.kind),
        ),
        h('div', { className: 'node-meta' }, data.table),
      );
    }

    function FeatureNode({ data }) {
      const tags = [];
      if (data.source_table) tags.push(data.source_table);
      if (data.operation) tags.push(data.operation);

      return h('div', { className: 'node-feature' },
        h(Handle, { type: 'target', position: Position.Left }),
        h(Handle, { type: 'source', position: Position.Right }),
        h('div', { className: 'node-header' },
          h('span', { className: 'node-title' }, data.label),
          data.lifecycle ? h('span', { className: 'badge badge-lifecycle' }, data.lifecycle) : null,
        ),
        data.description ? h('div', { className: 'node-desc' }, data.description) : null,
        data.sourceLabel ? h('div', { className: 'node-source' }, data.sourceLabel) : null,
        tags.length > 0 ? h('div', { className: 'node-tags' },
          ...tags.map((t, i) => h('span', { key: i, className: 'tag' }, t)),
        ) : null,
      );
    }

    function ActionNode({ data }) {
      return h('div', { className: 'node-action' },
        h(Handle, { type: 'target', position: Position.Left }),
        h('div', { className: 'node-header' },
          h('span', { className: 'node-title' }, data.actionType),
          h('span', { className: 'badge badge-action' }, 'Action'),
        ),
        data.detail ? h('div', { className: 'node-meta' }, data.detail) : null,
      );
    }

    const nodeTypes = { subject: SubjectNode, feature: FeatureNode, action: ActionNode };

    function buildGraph(engine) {
      const nodes = [];
      const edges = [];
      const subjects = engine.subjects || [];
      const features = engine.features || [];

      const featuresBySubject = {};
      const unlinked = [];
      features.forEach(f => {
        const key = f.subject_state_analysis?.lifecycle_subject;
        if (key && subjects.find(s => s.key === key)) {
          (featuresBySubject[key] ??= []).push(f);
        } else {
          unlinked.push(f);
        }
      });

      const COL_SUBJECT = 0;
      const COL_FEATURE = 380;
      const COL_ACTION = 780;
      const FEATURE_GAP = 220;
      const GROUP_GAP = 60;
      let y = 0;

      subjects.forEach(s => {
        const group = featuresBySubject[s.key] || [];
        const groupHeight = Math.max(1, group.length) * FEATURE_GAP;
        const mid = y + (groupHeight - FEATURE_GAP) / 2;

        nodes.push({
          id: `s-${s.key}`,
          type: 'subject',
          position: { x: COL_SUBJECT, y: mid },
          data: {
            label: s.key,
            kind: s.kind,
            table: s.table,
          },
        });

        group.forEach((f, i) => {
          const fid = `f-${f.key}`;
          const dl = f.data_logic || {};
          const src = dl.source || {};
          const ssa = f.subject_state_analysis || {};

          nodes.push({
            id: fid,
            type: 'feature',
            position: { x: COL_FEATURE, y: y + i * FEATURE_GAP },
            data: {
              label: f.name || f.key,
              description: f.how_it_works || '',
              sourceLabel: f.source || '',
              source_table: src.table || '',
              operation: src.operation || '',
              lifecycle: ssa.lifecycle_subject || '',
            },
          });

          edges.push({
            id: `e-${s.key}-${f.key}`,
            source: `s-${s.key}`,
            target: fid,
            type: 'smoothstep',
            animated: true,
            style: { stroke: '#30a14e', strokeWidth: 1.5 },
          });

          if (f.action) {
            const aid = `a-${f.key}`;
            const detail = f.action.config?.subject || f.action.config?.template || '';
            nodes.push({
              id: aid,
              type: 'action',
              position: { x: COL_ACTION, y: y + i * FEATURE_GAP },
              data: {
                actionType: f.action.use,
                detail: detail,
              },
            });
            edges.push({
              id: `e-${f.key}-act`,
              source: fid,
              target: aid,
              type: 'smoothstep',
              style: { stroke: '#f0883e', strokeWidth: 1.5 },
              label: f.action.use,
            });
          }
        });

        y += groupHeight + GROUP_GAP;
      });

      unlinked.forEach((f, i) => {
        const fid = `f-${f.key}`;
        const dl = f.data_logic || {};
        const src = dl.source || {};
        const ssa = f.subject_state_analysis || {};

        nodes.push({
          id: fid,
          type: 'feature',
          position: { x: COL_FEATURE, y: y + i * FEATURE_GAP },
          data: {
            label: f.name || f.key,
            description: f.how_it_works || '',
            sourceLabel: f.source || '',
            source_table: src.table || '',
            operation: src.operation || '',
            lifecycle: ssa.lifecycle_subject || '',
          },
        });

        if (f.action) {
          const aid = `a-${f.key}`;
          const detail = f.action.config?.subject || f.action.config?.template || '';
          nodes.push({
            id: aid,
            type: 'action',
            position: { x: COL_ACTION, y: y + i * FEATURE_GAP },
            data: { actionType: f.action.use, detail },
          });
          edges.push({
            id: `e-${f.key}-act`,
            source: fid,
            target: aid,
            type: 'smoothstep',
            style: { stroke: '#f0883e', strokeWidth: 1.5 },
            label: f.action.use,
          });
        }
      });

      return { nodes, edges };
    }

    function App() {
      const [result, setResult] = useState(null);
      const [error, setError] = useState(null);

      useEffect(() => {
        fetch('/api/data')
          .then(r => { if (!r.ok) throw new Error('Failed to load'); return r.json(); })
          .then(d => setResult(d))
          .catch(e => setError(e.message));
      }, []);

      if (error) return h('div', { style: { padding: 40, color: '#f85149' } }, 'Error: ' + error);
      if (!result) return h('div', { style: { padding: 40, color: '#8b949e' } }, 'Loading\u2026');

      const graph = buildGraph(result.data);

      return h('div', { style: { width: '100vw', height: '100vh' } },
        h(ReactFlow, {
          defaultNodes: graph.nodes,
          defaultEdges: graph.edges,
          nodeTypes,
          fitView: true,
          colorMode: 'dark',
          minZoom: 0.3,
          defaultEdgeOptions: { type: 'smoothstep' },
          proOptions: { hideAttribution: true },
        },
          h(Background, { gap: 20, size: 1, color: '#21262d' }),
          h(Controls, { showInteractive: false }),
          h(MiniMap, {
            nodeColor: '#30363d',
            maskColor: 'rgba(13, 17, 23, 0.7)',
            style: { background: '#0d1117' },
          }),
        )
      );
    }

    createRoot(document.getElementById('root')).render(h(App));
  </script>
</body>
</html>
