<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skene — User Journey Visualizer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
    }

    .react-flow__node { font-family: inherit; }

    /* Subject card */
    .node-subject {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 14px 18px;
      min-width: 180px;
    }
    .node-subject .node-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .node-subject .node-title {
      font-size: 15px;
      font-weight: 600;
      color: #e6edf3;
      text-transform: capitalize;
    }
    .node-subject .node-meta {
      font-size: 11px;
      color: #7d8590;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .badge-actor  { background: #1f3a2d; color: #56d364; }
    .badge-entity { background: #1c2a41; color: #79c0ff; }
    .badge-ui     { background: #2d1f3a; color: #d2a8ff; }
    .badge-milestone { background: #1f3a2d; color: #56d364; }
    .badge-value  { background: #3d2a1f; color: #f0883e; }

    .badge-stage-signup       { background: #1c2a41; color: #79c0ff; }
    .badge-stage-activation   { background: #1f3a2d; color: #56d364; }
    .badge-stage-engagement   { background: #2d1f3a; color: #d2a8ff; }
    .badge-stage-monetization { background: #3d2a1f; color: #f0883e; }
    .badge-stage-retention    { background: #3a1f2a; color: #ff7b72; }

    /* Feature card */
    .node-feature {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 16px 18px;
      min-width: 260px;
      max-width: 320px;
    }
    .node-feature .node-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }
    .node-feature .node-title {
      font-size: 14px;
      font-weight: 600;
      color: #e6edf3;
      line-height: 1.3;
    }
    .node-feature .node-desc {
      font-size: 12px;
      color: #8b949e;
      line-height: 1.5;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .node-feature .node-source {
      font-size: 11px;
      color: #7d8590;
      font-family: 'SF Mono', 'Fira Code', monospace;
      margin-bottom: 8px;
    }
    .node-feature .node-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .tag {
      display: inline-block;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 4px;
      background: #1c2a41;
      color: #79c0ff;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    .badge-lifecycle {
      background: #2d1f3a;
      color: #d2a8ff;
    }

    /* Action card */
    .node-action {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 14px 18px;
      min-width: 160px;
    }
    .node-action .node-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .node-action .node-title {
      font-size: 13px;
      font-weight: 600;
      color: #e6edf3;
      text-transform: capitalize;
    }
    .node-action .node-meta {
      font-size: 11px;
      color: #7d8590;
    }

    .badge-action { background: #3d2a1f; color: #f0883e; }

    /* Edge labels */
    .react-flow__edge-textbg { fill: #161b22; }
    .react-flow__edge-text { fill: #7d8590; font-size: 11px; }

    /* Handles */
    .react-flow__handle {
      width: 8px;
      height: 8px;
      background: #30363d;
      border: 2px solid #484f58;
    }
  </style>
</head>
<body>
  <div id="root" style="width:100vw;height:100vh"></div>

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react-dom": "https://esm.sh/react-dom@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
      "@xyflow/react": "https://esm.sh/@xyflow/react@12.10.2?external=react,react-dom"
    }
  }
  </script>

  <link rel="stylesheet" href="https://esm.sh/@xyflow/react@12.10.2/dist/style.css" />

  <script type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import {
      ReactFlow, Background, Controls, MiniMap, Handle, Position,
    } from '@xyflow/react';

    const h = React.createElement;

    function stageBadgeClass(stageId) {
      const key = (stageId || '').replace(/^stage_/, '');
      return `badge badge-stage-${key || 'signup'}`;
    }

    function SubjectNode({ data }) {
      return h('div', { className: 'node-subject' },
        h(Handle, { type: 'source', position: Position.Right }),
        h('div', { className: 'node-header' },
          h('span', { className: 'node-title' }, data.label),
          h('span', { className: 'badge badge-entity' }, 'subject'),
        ),
        data.table ? h('div', { className: 'node-meta' }, data.table) : null,
      );
    }

    function StepNode({ data }) {
      const tags = [];
      if (data.tableRef) tags.push(data.tableRef);
      if (data.eventType) tags.push(data.eventType);
      if (data.route) tags.push(data.route);

      const kindBadge = data.kind === 'ui_step' ? 'badge badge-ui' : 'badge badge-milestone';
      const kindLabel = data.kind === 'ui_step' ? 'UI' : 'milestone';

      return h('div', { className: 'node-feature' },
        h(Handle, { type: 'target', position: Position.Left }),
        h(Handle, { type: 'source', position: Position.Right }),
        h(Handle, { type: 'source', position: Position.Bottom, id: 'value' }),
        h('div', { className: 'node-header' },
          h('span', { className: 'node-title' }, data.label),
          h('span', { className: kindBadge }, kindLabel),
        ),
        data.stageLabel ? h('div', { style: { marginBottom: 8 } },
          h('span', { className: stageBadgeClass(data.stageId) }, data.stageLabel),
        ) : null,
        data.description ? h('div', { className: 'node-desc' }, data.description) : null,
        data.component ? h('div', { className: 'node-source' }, data.component) : null,
        tags.length > 0 ? h('div', { className: 'node-tags' },
          ...tags.map((t, i) => h('span', { key: i, className: 'tag' }, t)),
        ) : null,
      );
    }

    function ValueNode({ data }) {
      return h('div', { className: 'node-action' },
        h(Handle, { type: 'target', position: Position.Top, id: 'value' }),
        h('div', { className: 'node-header' },
          h('span', { className: 'node-title' }, data.label),
          h('span', { className: 'badge badge-value' }, data.valueType || 'value'),
        ),
        data.timeToValue ? h('div', { className: 'node-meta' }, data.timeToValue) : null,
        data.description ? h('div', { className: 'node-desc', style: { marginTop: 6 } }, data.description) : null,
      );
    }

    const nodeTypes = { subject: SubjectNode, step: StepNode, value: ValueNode };

    // user-journey.yaml shape:
    //   schema_analysis.ttv_journey_by_subject[].{subject_id, subject_label, subject_table,
    //     ordered_nodes[], value_nodes[], ordered_edges[]}
    function buildGraph(doc) {
      const nodes = [];
      const edges = [];
      const journeys = doc?.schema_analysis?.ttv_journey_by_subject || [];

      const COL_SUBJECT = 0;
      const COL_STEP_BASE = 340;
      const COL_STEP_GAP = 320;
      const STEP_Y = 0;
      const VALUE_Y_OFFSET = 220;
      const ROW_HEIGHT = 480;

      journeys.forEach((journey, journeyIdx) => {
        const subjectId = journey.subject_id;
        const yBase = journeyIdx * ROW_HEIGHT;
        const ns = (id) => (id === subjectId ? subjectId : `${subjectId}__${id}`);

        nodes.push({
          id: subjectId,
          type: 'subject',
          position: { x: COL_SUBJECT, y: yBase + STEP_Y },
          data: {
            label: journey.subject_label || subjectId,
            table: journey.subject_table || '',
          },
        });

        const stepXById = {};
        (journey.ordered_nodes || []).forEach((node, i) => {
          const nodeId = ns(node.id);
          const x = COL_STEP_BASE + i * COL_STEP_GAP;
          stepXById[node.id] = x;
          const tableRef = node.is_ui_only
            ? ''
            : [node.schema, node.table].filter(Boolean).join('.');
          nodes.push({
            id: nodeId,
            type: 'step',
            position: { x, y: yBase + STEP_Y },
            data: {
              label: node.label || node.id,
              kind: node.kind || 'milestone',
              description: node.description || '',
              stageId: node.lifecycle_stage_id || node.lifecycle?.stage_id || '',
              stageLabel: node.lifecycle?.label || node.category || '',
              tableRef,
              eventType: node.event_type || '',
              route: node.route || '',
              component: node.component || '',
            },
          });
        });

        (journey.value_nodes || []).forEach((vn, i) => {
          const valueId = ns(vn.id);
          const linkedX = stepXById[vn.linked_from_node_id];
          const x = linkedX !== undefined
            ? linkedX
            : COL_STEP_BASE + i * COL_STEP_GAP;
          nodes.push({
            id: valueId,
            type: 'value',
            position: { x, y: yBase + STEP_Y + VALUE_Y_OFFSET },
            data: {
              label: vn.label || vn.id,
              valueType: vn.value_type || 'value',
              timeToValue: vn.time_to_value_label || '',
              description: vn.description || '',
            },
          });
          if (vn.linked_from_node_id) {
            edges.push({
              id: `ev-${valueId}`,
              source: ns(vn.linked_from_node_id),
              sourceHandle: 'value',
              target: valueId,
              targetHandle: 'value',
              type: 'smoothstep',
              style: { stroke: '#f0883e', strokeWidth: 1.5, strokeDasharray: '4 4' },
              label: vn.time_to_value_label || 'value',
            });
          }
        });

        (journey.ordered_edges || []).forEach((e, i) => {
          const sourceId = ns(e.source);
          const targetId = ns(e.target);
          const label = e.data_change?.summary || e.label || '';
          edges.push({
            id: `e-${subjectId}-${i}`,
            source: sourceId,
            target: targetId,
            type: 'smoothstep',
            animated: e.is_required !== false,
            style: { stroke: '#30a14e', strokeWidth: 1.5 },
            label,
          });
        });
      });

      return { nodes, edges };
    }

    function App() {
      const [result, setResult] = useState(null);
      const [error, setError] = useState(null);

      useEffect(() => {
        fetch('/api/data')
          .then(r => { if (!r.ok) throw new Error('Failed to load'); return r.json(); })
          .then(d => setResult(d))
          .catch(e => setError(e.message));
      }, []);

      if (error) return h('div', { style: { padding: 40, color: '#f85149' } }, 'Error: ' + error);
      if (!result) return h('div', { style: { padding: 40, color: '#8b949e' } }, 'Loading\u2026');

      const graph = buildGraph(result.data);

      return h('div', { style: { width: '100vw', height: '100vh' } },
        h(ReactFlow, {
          defaultNodes: graph.nodes,
          defaultEdges: graph.edges,
          nodeTypes,
          fitView: true,
          colorMode: 'dark',
          minZoom: 0.3,
          defaultEdgeOptions: { type: 'smoothstep' },
          proOptions: { hideAttribution: true },
        },
          h(Background, { gap: 20, size: 1, color: '#21262d' }),
          h(Controls, { showInteractive: false }),
          h(MiniMap, {
            nodeColor: '#30363d',
            maskColor: 'rgba(13, 17, 23, 0.7)',
            style: { background: '#0d1117' },
          }),
        )
      );
    }

    createRoot(document.getElementById('root')).render(h(App));
  </script>
</body>
</html>
